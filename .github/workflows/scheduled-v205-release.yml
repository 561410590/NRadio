name: Scheduled V2.0.5 release

on:
  schedule:
    # 2026-05-01 00:00 Asia/Shanghai = 2026-04-30 16:00 UTC
    - cron: "0 16 30 4 *"
  workflow_dispatch:
    inputs:
      force:
        description: "Manual override for emergency publish"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: scheduled-v205-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Guard release window
        run: |
          set -eu
          target="$(date -u -d '2026-04-30 16:00:00 UTC' +%s)"
          latest="$(date -u -d '2026-05-01 04:00:00 UTC' +%s)"
          now="$(date -u +%s)"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            echo "Manual force publish enabled."
            exit 0
          fi

          if [ "$now" -lt "$target" ]; then
            echo "Not time yet. Target UTC: 2026-04-30 16:00:00"
            exit 1
          fi

          if [ "$now" -gt "$latest" ]; then
            echo "Release window expired; refusing yearly re-run."
            exit 1
          fi

      - name: Validate V2.0.5 main state
        run: |
          set -eu
          grep -q 'SCRIPT_VERSION="V2.0.5"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'SCRIPT_RELEASE_DATE="2026-05-01"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'V2.0.5' 40-server-web/mayebano-support/index.html
          grep -q 'V2.0.5 已发布' 40-server-web/mayebano-support/index.html
          grep -q '下载 V2.0.5' 40-server-web/mayebano-support/index.html
          grep -q '58c01d90c9518616c6bedb3ef1338a0eee9b99f869ab83e83ccd9ba93cb8c91e' CHECKSUMS.txt
          grep -q '6163113ee4066c19a8bd6fa1fb95cf32dde9bc9ef8e39b647657a6acaca5bdb4' CHECKSUMS.txt

      - name: Create GitHub Release V2.0.5
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          git fetch origin --tags +refs/heads/main:refs/remotes/origin/main
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          grep -q 'SCRIPT_VERSION="V2.0.5"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'SCRIPT_RELEASE_DATE="2026-05-01"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '下载 V2.0.5' 40-server-web/mayebano-support/index.html
          grep -q '58c01d90c9518616c6bedb3ef1338a0eee9b99f869ab83e83ccd9ba93cb8c91e' CHECKSUMS.txt

          if git rev-parse "v2.0.5^{commit}" >/dev/null 2>&1; then
            tag_commit="$(git rev-parse "v2.0.5^{commit}")"
            head_commit="$(git rev-parse HEAD)"
            if [ "$tag_commit" != "$head_commit" ]; then
              echo "v2.0.5 tag points to $tag_commit, expected $head_commit"
              exit 1
            fi
          else
            git tag -a v2.0.5 -m "ssh-nradio-plugin-installer V2.0.5"
            git push origin v2.0.5
          fi

          if gh release view v2.0.5 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v2.0.5 already exists."
            exit 0
          fi

          cat > /tmp/v205-release-notes.md <<'EOF'
          V2.0.5 scheduled public release.

          - Default download script: ssh-nradio-plugin-installer.sh
          - Version: V2.0.5
          - Release date: 2026-05-01
          - Support page and default download entry are switched to V2.0.5.
          - C8-688 and C2000MAX keep separate default fan-control strategies during installation.
          - OpenVPN Mk3 page polish, fast status mode, and status pill layout fixes are written back into the main installer.
          - The public support page uses the pink V2.0.5 release skin with mobile layout fixes.
          - CHECKSUMS.txt is included for public file verification.
          EOF

          gh release create v2.0.5 \
            "00-current/ssh-nradio-plugin-installer.sh#ssh-nradio-plugin-installer.sh" \
            "CHECKSUMS.txt#CHECKSUMS.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ssh-nradio-plugin-installer V2.0.5" \
            --notes-file /tmp/v205-release-notes.md
