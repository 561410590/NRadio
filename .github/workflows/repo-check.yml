name: Repository checks

on:
  push:
  pull_request:

jobs:
  public-release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify public release files
        run: |
          test -f 00-current/ssh-nradio-plugin-installer.sh
          test -f 40-server-web/mayebano-support/index.html
          test -f vercel.json
          test -f README.md
          test -f CHANGELOG.md
          test -f CHECKSUMS.txt
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f .github/ISSUE_TEMPLATE/bug_report.yml

      - name: Verify V2.0.15 script state
        run: |
          grep -q 'SCRIPT_VERSION="V2.0.15"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'SCRIPT_RELEASE_DATE="2026-05-01"' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q '???' 00-current/ssh-nradio-plugin-installer.sh
          grep -q "printf '3. ?????" 00-current/ssh-nradio-plugin-installer.sh
          grep -q "printf '1. ?????" 00-current/ssh-nradio-plugin-installer.sh
          grep -q "printf '2. ?????" 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio_C8-668' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'HC-WT9108' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio_C8-688|NRadio_C2000MAX' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio_C8-688 / C2000MAX ????' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '????' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'Smart ????' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '??????' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '????' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'open_route = "nradioadv/system/fanctrl";' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'QIYOU_INSTALLER_SHA256' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'LEIGOD_INSTALLER_SHA256' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'verify_remote_script_sha256 "??????"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'verify_remote_script_sha256 "????????"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'fast_probe' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio OpenVPN Mk2 fast-open polish' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '??? ????' 00-current/ssh-nradio-plugin-installer.sh
          grep -Fq '[ -f /tmp/qy/etc/PKG_INFO ] && cat /tmp/qy/etc/PKG_INFO || true' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'schedule_enabled' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'schedule_start' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'schedule_end' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'schedule_mode' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '????' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '????' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'OpenWrt 21.02.7 ???' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '???: ???? OpenWrt 21.02.7 ???' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'ensure_opkg_update' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q 'opkg update || die "opkg update ??"' 00-current/ssh-nradio-plugin-installer.sh

      - name: Verify support page state
        run: |
          grep -q 'V2.0.15' 40-server-web/mayebano-support/index.html
          grep -q 'NRadio_C8-668' 40-server-web/mayebano-support/index.html
          grep -q '?? / ?????' 40-server-web/mayebano-support/index.html
          grep -q '????????????????????' 40-server-web/mayebano-support/index.html
          grep -q 'OpenWrt 21.02.7 ???' 40-server-web/mayebano-support/index.html
          grep -q 'OpenVPN ??????' 40-server-web/mayebano-support/index.html
          grep -q '????' 40-server-web/mayebano-support/index.html
          grep -q '????' 40-server-web/mayebano-support/index.html
          grep -q 'feature-brief' 40-server-web/mayebano-support/index.html
          grep -q 'GitHub ??' 40-server-web/mayebano-support/index.html
          grep -q 'MobaXterm' 40-server-web/mayebano-support/index.html
          grep -q '3. ???????' 40-server-web/mayebano-support/index.html
          grep -q 'wget -O ssh-nradio-plugin-installer.sh https://nradio.mayebano.shop/ssh-nradio-plugin-installer.sh' 40-server-web/mayebano-support/index.html
          grep -q '???' 40-server-web/mayebano-support/index.html
          ! grep -q 'V2.0.5' 40-server-web/mayebano-support/index.html
          ! grep -q 'HC-WT9108' 40-server-web/mayebano-support/index.html
          ! grep -q '????' 40-server-web/mayebano-support/index.html
          ! grep -q '??????' 40-server-web/mayebano-support/index.html
          ! grep -q '???????' 40-server-web/mayebano-support/index.html
          ! grep -q 'SFTP' 40-server-web/mayebano-support/index.html
          ! grep -q 'data-route="A"' 40-server-web/mayebano-support/index.html
          ! grep -q 'data-route="B"' 40-server-web/mayebano-support/index.html
          ! grep -q 'ssh-nradio-plugin-installer-2.0.0beta.sh' 40-server-web/mayebano-support/index.html
          ! grep -q 'install-card' 40-server-web/mayebano-support/index.html

      - name: Verify Vercel public routes
        run: |
          grep -q '"/ssh-nradio-plugin-installer.sh"' vercel.json
          ! grep -q 'ssh-nradio-plugin-installer-2.0.0beta.sh' vercel.json

      - name: Verify checksum record
        run: |
          grep -q '36908f940697380b7dadab94321a381f7465868a95aadbd5bcde43f3b1f0bbf3' CHECKSUMS.txt
          grep -q 'bb73c749acf23738e2b1495fd3b68dcce0fa695ce1a6884ef1b2fb5c9e64a693' CHECKSUMS.txt
          printf '%s  %s\n' '36908f940697380b7dadab94321a381f7465868a95aadbd5bcde43f3b1f0bbf3' '00-current/ssh-nradio-plugin-installer.sh' | sha256sum -c -
          printf '%s  %s\n' 'bb73c749acf23738e2b1495fd3b68dcce0fa695ce1a6884ef1b2fb5c9e64a693' '40-server-web/mayebano-support/index.html' | sha256sum -c -

      - name: Verify license
        run: |
          grep -q 'MIT License' LICENSE
          grep -q 'Copyright (c) 2026 maye' LICENSE
          grep -q 'MIT License' README.md

      - name: Verify repository docs
        run: |
          grep -q 'GitHub main -> Vercel Production' CONTRIBUTING.md
          grep -q 'Only the current public script is maintained' SECURITY.md
          grep -q 'Do not include router passwords' .github/ISSUE_TEMPLATE/bug_report.yml
