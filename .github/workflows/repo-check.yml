name: Repository checks

on:
  push:
  pull_request:

jobs:
  public-release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify public release files
        run: |
          test -f 00-current/ssh-nradio-plugin-installer.sh
          test -f 40-server-web/mayebano-support/index.html
          test -f vercel.json
          test -f README.md
          test -f CHANGELOG.md
          test -f CHECKSUMS.txt
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f .github/ISSUE_TEMPLATE/bug_report.yml

      - name: Verify V2.0.5 script state
        run: |
          grep -q 'SCRIPT_VERSION="V2.0.5"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'SCRIPT_RELEASE_DATE="2026-05-01"' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q '测试中' 00-current/ssh-nradio-plugin-installer.sh
          grep -q "printf '3. 游戏加速器" 00-current/ssh-nradio-plugin-installer.sh
          grep -q "printf '1. 奇游联机宝" 00-current/ssh-nradio-plugin-installer.sh
          grep -q "printf '2. 雷神加速器" 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio_C8-688|NRadio_C2000MAX' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio_C8-688 / C2000MAX 风扇控制' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '温度来源' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'Smart 最低风速' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '过热保护温度' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '检测间隔' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'open_route = "nradioadv/system/fanctrl";' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'verify_remote_script_sha256 "奇游入口脚本"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'verify_remote_script_sha256 "雷神官方安装脚本"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'JSON.parse' 00-current/ssh-nradio-plugin-installer.sh

      - name: Verify support page state
        run: |
          grep -q 'V2.0.5' 40-server-web/mayebano-support/index.html
          grep -q 'V2.0.5 已发布' 40-server-web/mayebano-support/index.html
          grep -q 'href="/ssh-nradio-plugin-installer.sh" download>下载 V2.0.5' 40-server-web/mayebano-support/index.html
          grep -q 'Pink release skin' 40-server-web/mayebano-support/index.html
          grep -q 'GitHub 项目' 40-server-web/mayebano-support/index.html
          grep -q '安装前提' 40-server-web/mayebano-support/index.html
          grep -q 'MobaXterm' 40-server-web/mayebano-support/index.html
          grep -q '电脑下载后上传' 40-server-web/mayebano-support/index.html
          ! grep -q '2026.5.1' 40-server-web/mayebano-support/index.html
          ! grep -q '2026-05-01' 40-server-web/mayebano-support/index.html
          ! grep -q '发布时间' 40-server-web/mayebano-support/index.html
          ! grep -q '发布日期' 40-server-web/mayebano-support/index.html
          ! grep -q '即将发布' 40-server-web/mayebano-support/index.html
          ! grep -q '下载 V2.0.3' 40-server-web/mayebano-support/index.html
          ! grep -q '>立即下载脚本<' 40-server-web/mayebano-support/index.html
          ! grep -q 'ssh-nradio-plugin-installer-2.0.0beta.sh' 40-server-web/mayebano-support/index.html

      - name: Verify Vercel public routes
        run: |
          grep -q '"/ssh-nradio-plugin-installer.sh"' vercel.json
          ! grep -q 'ssh-nradio-plugin-installer-2.0.0beta.sh' vercel.json

      - name: Verify checksum record
        run: |
          grep -q '58c01d90c9518616c6bedb3ef1338a0eee9b99f869ab83e83ccd9ba93cb8c91e' CHECKSUMS.txt
          grep -q '6163113ee4066c19a8bd6fa1fb95cf32dde9bc9ef8e39b647657a6acaca5bdb4' CHECKSUMS.txt
          printf '%s  %s\n' '58c01d90c9518616c6bedb3ef1338a0eee9b99f869ab83e83ccd9ba93cb8c91e' '00-current/ssh-nradio-plugin-installer.sh' | sha256sum -c -

      - name: Verify license
        run: |
          grep -q 'MIT License' LICENSE
          grep -q 'Copyright (c) 2026 maye' LICENSE
          grep -q 'MIT License' README.md

      - name: Verify repository docs
        run: |
          grep -q 'GitHub main -> Vercel Production' CONTRIBUTING.md
          grep -q 'Only the current public script is maintained' SECURITY.md
          grep -q 'Do not include router passwords' .github/ISSUE_TEMPLATE/bug_report.yml
