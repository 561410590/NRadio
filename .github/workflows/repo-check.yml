name: Repository checks

on:
  push:
  pull_request:

jobs:
  public-release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify public release files
        run: |
          test -f 00-current/ssh-nradio-plugin-installer.sh
          test -f 40-server-web/mayebano-support/index.html
          test -f vercel.json
          test -f README.md
          test -f CHANGELOG.md
          test -f CHECKSUMS.txt
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f .github/ISSUE_TEMPLATE/bug_report.yml

      - name: Verify V2.0.20 script state
        run: |
          grep -q 'SCRIPT_VERSION="V2.0.20"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'SCRIPT_RELEASE_DATE="2026-05-02"' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q '测试中' 00-current/ssh-nradio-plugin-installer.sh
          grep -q "printf '3. 游戏加速器" 00-current/ssh-nradio-plugin-installer.sh
          grep -q "printf '1. 奇游联机宝" 00-current/ssh-nradio-plugin-installer.sh
          grep -q "printf '2. 雷神加速器" 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio_C8-668' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'HC-WT9108' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio_C8-688|NRadio_C2000MAX' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio_C8-688 / C2000MAX 风扇控制' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '温度来源' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'Smart 最低风速' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '过热保护温度' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '检测间隔' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'open_route = "nradioadv/system/fanctrl";' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'QIYOU_INSTALLER_SHA256' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'LEIGOD_INSTALLER_SHA256' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'verify_remote_script_sha256 "奇游入口脚本"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'verify_remote_script_sha256 "雷神官方安装脚本"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'fast_probe' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'NRadio OpenVPN Mk3: dark command-center layer' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'EOF_OPENVPN_MK3_FINAL_POLISH' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'EOF_OPENVPN_OVPN_CSS_MK3_EXACT' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'EOF_OPENVPN_STANDARD_MODEL' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'vpn-shell-mk3' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q 'Mk2' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q 'mk2' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q 'MK2' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '哈基米 打开路由' 00-current/ssh-nradio-plugin-installer.sh
          grep -Fq '[ -f /tmp/qy/etc/PKG_INFO ] && cat /tmp/qy/etc/PKG_INFO || true' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'schedule_enabled' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'schedule_start' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'schedule_end' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'schedule_mode' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '定时策略' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '定时期间' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'OpenWrt 21.02.7 清华源' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '软件源: 当前不是 OpenWrt 21.02.7 清华源' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'ensure_opkg_update' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q 'opkg update || die "opkg update 失败"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'OpenVPN 控制台' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '目标检查' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '返回控制台' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '模板' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q '推荐动作' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q '实时校验' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q '诊断工作区' 00-current/ssh-nradio-plugin-installer.sh
          ! grep -q 'OEM 视图' 00-current/ssh-nradio-plugin-installer.sh

      - name: Verify support page state
        run: |
          grep -q 'V2.0.20' 40-server-web/mayebano-support/index.html
          grep -q 'NRadio_C8-668' 40-server-web/mayebano-support/index.html
          grep -q 'OpenVPN 控制台界面升级' 40-server-web/mayebano-support/index.html
          grep -q 'OpenVPN 控制台与配置页面完成界面升级' 40-server-web/mayebano-support/index.html
          grep -q '暗色控制台风格' 40-server-web/mayebano-support/index.html
          grep -q 'V2.0.15' 40-server-web/mayebano-support/index.html
          grep -q '奇游 / 雷神源切换' 40-server-web/mayebano-support/index.html
          grep -q '奇游、雷神安装前复用哈基米软件源检查流程' 40-server-web/mayebano-support/index.html
          grep -q 'OpenWrt 21.02.7 清华源' 40-server-web/mayebano-support/index.html
          grep -q 'OpenVPN 快速状态读取' 40-server-web/mayebano-support/index.html
          grep -q '安装教程' 40-server-web/mayebano-support/index.html
          grep -q '主要功能' 40-server-web/mayebano-support/index.html
          grep -q 'feature-brief' 40-server-web/mayebano-support/index.html
          grep -q 'GitHub 开源' 40-server-web/mayebano-support/index.html
          grep -q 'MobaXterm' 40-server-web/mayebano-support/index.html
          grep -q '3. 路由器在线下载' 40-server-web/mayebano-support/index.html
          grep -q 'wget -O ssh-nradio-plugin-installer.sh https://nradio.mayebano.shop/ssh-nradio-plugin-installer.sh' 40-server-web/mayebano-support/index.html
          grep -q '哈基米' 40-server-web/mayebano-support/index.html
          ! grep -q 'V2.0.5' 40-server-web/mayebano-support/index.html
          ! grep -q 'HC-WT9108' 40-server-web/mayebano-support/index.html
          ! grep -q '我的项目' 40-server-web/mayebano-support/index.html
          ! grep -q '安装方式提醒' 40-server-web/mayebano-support/index.html
          ! grep -q '电脑下载后上传' 40-server-web/mayebano-support/index.html
          ! grep -q 'SFTP' 40-server-web/mayebano-support/index.html
          ! grep -q 'data-route="A"' 40-server-web/mayebano-support/index.html
          ! grep -q 'data-route="B"' 40-server-web/mayebano-support/index.html
          ! grep -q 'ssh-nradio-plugin-installer-2.0.0beta.sh' 40-server-web/mayebano-support/index.html
          ! grep -q 'install-card' 40-server-web/mayebano-support/index.html

      - name: Verify Vercel public routes
        run: |
          grep -q '"/ssh-nradio-plugin-installer.sh"' vercel.json
          ! grep -q 'ssh-nradio-plugin-installer-2.0.0beta.sh' vercel.json

      - name: Verify checksum record
        run: |
          grep -q '143166f7043dbcca54ab9fd59fbfb200cd360cc4efb1f87cf2d71a300e6e4718' CHECKSUMS.txt
          grep -q '336d6900d6075b2d3b0e04525baa1e2be8568ecb509ac0e3f9926aff1e2baf94' CHECKSUMS.txt
          grep -q '971846  00-current/ssh-nradio-plugin-installer.sh' CHECKSUMS.txt
          grep -q '185402  40-server-web/mayebano-support/index.html' CHECKSUMS.txt
          printf '%s  %s\n' '143166f7043dbcca54ab9fd59fbfb200cd360cc4efb1f87cf2d71a300e6e4718' '00-current/ssh-nradio-plugin-installer.sh' | sha256sum -c -
          printf '%s  %s\n' '336d6900d6075b2d3b0e04525baa1e2be8568ecb509ac0e3f9926aff1e2baf94' '40-server-web/mayebano-support/index.html' | sha256sum -c -

      - name: Verify license
        run: |
          grep -q 'MIT License' LICENSE
          grep -q 'Copyright (c) 2026 maye' LICENSE
          grep -q 'MIT License' README.md

      - name: Verify repository docs
        run: |
          grep -q 'V2.0.20' README.md
          grep -q 'V2.0.20' CHANGELOG.md
          grep -q 'OpenVPN 控制台界面升级' README.md
          grep -q 'OpenVPN 控制台界面升级' CHANGELOG.md
          grep -q '143166f7043dbcca54ab9fd59fbfb200cd360cc4efb1f87cf2d71a300e6e4718' README.md
          grep -q '971846' README.md
          grep -q 'GitHub main -> Vercel Production' CONTRIBUTING.md
          grep -q 'Only the current public script is maintained' SECURITY.md
          grep -q 'Do not include router passwords' .github/ISSUE_TEMPLATE/bug_report.yml
