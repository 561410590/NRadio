name: Scheduled V2.0.15 release

on:
  schedule:
    # 2026-05-01 00:00 Asia/Shanghai = 2026-04-30 16:00 UTC
    - cron: "0 16 30 4 *"

permissions:
  contents: write

concurrency:
  group: scheduled-v2015-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Guard release window
        run: |
          set -eu
          target="$(date -u -d '2026-04-30 16:00:00 UTC' +%s)"
          latest="$(date -u -d '2026-05-01 04:00:00 UTC' +%s)"
          now="$(date -u +%s)"

          if [ "$now" -lt "$target" ]; then
            echo "Not time yet. Target UTC: 2026-04-30 16:00:00"
            exit 1
          fi

          if [ "$now" -gt "$latest" ]; then
            echo "Release window expired; refusing yearly re-run."
            exit 1
          fi

      - name: Merge prepared release branch into main
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin \
            main:refs/remotes/origin/main \
            release/v2.0.15-scheduled:refs/remotes/origin/release/v2.0.15-scheduled
          git checkout -B main origin/main

          if grep -q 'SCRIPT_VERSION="V2.0.15"' 00-current/ssh-nradio-plugin-installer.sh; then
            echo "V2.0.15 is already present on main."
          else
            git merge --no-ff --no-edit origin/release/v2.0.15-scheduled
          fi

          grep -q 'SCRIPT_VERSION="V2.0.15"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'SCRIPT_RELEASE_DATE="2026-05-01"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '36908f940697380b7dadab94321a381f7465868a95aadbd5bcde43f3b1f0bbf3' CHECKSUMS.txt
          grep -q '1f997f040af24c5012439f81186c58577a6091d96a314cfafc347dbd8a29340c' CHECKSUMS.txt
          grep -q 'V2.0.15' 40-server-web/mayebano-support/index.html
          grep -q '奇游 / 雷神源切换' 40-server-web/mayebano-support/index.html
          grep -q '奇游、雷神安装前复用哈基米软件源检查流程' 40-server-web/mayebano-support/index.html
          grep -q 'V2.0.15' README.md
          grep -q 'V2.0.15 - 2026-05-01' CHANGELOG.md

          git push origin HEAD:main

      - name: Create GitHub Release V2.0.15
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          git fetch origin main --tags
          git checkout -B main origin/main

          grep -q 'SCRIPT_VERSION="V2.0.15"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q 'SCRIPT_RELEASE_DATE="2026-05-01"' 00-current/ssh-nradio-plugin-installer.sh
          grep -q '36908f940697380b7dadab94321a381f7465868a95aadbd5bcde43f3b1f0bbf3' CHECKSUMS.txt

          if git rev-parse "v2.0.15^{commit}" >/dev/null 2>&1; then
            tag_commit="$(git rev-parse "v2.0.15^{commit}")"
            head_commit="$(git rev-parse HEAD)"
            if [ "$tag_commit" != "$head_commit" ]; then
              echo "v2.0.15 tag points to $tag_commit, expected $head_commit"
              exit 1
            fi
          else
            git tag -a v2.0.15 -m "ssh-nradio-plugin-installer V2.0.15"
            git push origin v2.0.15
          fi

          if gh release view v2.0.15 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release v2.0.15 already exists."
            exit 0
          fi

          cat > /tmp/v2015-release-notes.md <<'EOF'
          V2.0.15 正式发布。

          本次发布内容：

          - 版本：V2.0.15
          - 发布日期：2026-05-01
          - 脚本 SHA256：36908f940697380b7dadab94321a381f7465868a95aadbd5bcde43f3b1f0bbf3
          - 脚本大小：889185 字节
          - 奇游联机宝安装前复用哈基米软件源检查流程。
          - 雷神加速器安装前复用哈基米软件源检查流程。
          - 未切到 OpenWrt 21.02.7 清华源时，会先备份并切换，再继续安装依赖。
          - opkg update 失败提示统一指向 /tmp/nradio-plugin-opkg.update.log。
          - 公网页同步 V2.0.15 奇游 / 雷神源切换说明。

          Release 资产：

          - ssh-nradio-plugin-installer.sh
          - CHECKSUMS.txt
          EOF

          gh release create v2.0.15 \
            "00-current/ssh-nradio-plugin-installer.sh#ssh-nradio-plugin-installer.sh" \
            "CHECKSUMS.txt#CHECKSUMS.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --title "ssh-nradio-plugin-installer V2.0.15 正式版" \
            --notes-file /tmp/v2015-release-notes.md
