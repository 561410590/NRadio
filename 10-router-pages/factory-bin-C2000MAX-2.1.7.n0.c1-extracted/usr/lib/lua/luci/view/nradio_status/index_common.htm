function reset_canvas(obj){
	if(obj){
		var canvas_size = $(obj).data("size");
		var box_width=$(obj).width();
		if(box_width > canvas_size){
			box_width = canvas_size;
		}
		
		if(box_width){
			$(obj).children('canvas').width(box_width);
			$(obj).children('canvas').height(box_width);
		}
	}
	else{
		$('canvas').each(function(){
			var canvas_size = $(this).parent().data("size");
			var box_width = $(this).parent().width();
			if(box_width > canvas_size){
				box_width = canvas_size;
			}
			if(box_width){
				$(this).width(box_width);
				$(this).height(box_width);
			}
		});
	}
}
function isNumeric(str) {
  return /^\-*\d+$/.test(str);
}

function validatePositiveInteger(input) {
  var regex = /^[1-9]\d*$/;
  return regex.test(input);
}
function format_isp_info(sim_isp,isp){
	var target_isp = "";
	if (sim_isp && !validatePositiveInteger(sim_isp)){

		if(sim_isp == "中国联通" || sim_isp == "China Unicom"){
			target_isp="<img class='plmn_icon' src='/luci-static/nradio/images/Unicom.png'> ";
		}
		else if(sim_isp == "中国电信" || sim_isp == "China Telecom"){
			target_isp="<img class='plmn_icon' src='/luci-static/nradio/images/Telecom.png'> ";
		}
		else if(sim_isp == "中国移动" || sim_isp == "China Mobile"){
			target_isp="<img class='plmn_icon' src='/luci-static/nradio/images/Mobile.png'> ";
		}
		else if(sim_isp == "中国广电" || sim_isp == "China Broadnet"){
			target_isp="<img class='plmn_icon' src='/luci-static/nradio/images/Broadnet.png'> ";
		}
		else if(sim_isp == "AT&T"){
			target_isp="<img class='plmn_icon' src='/luci-static/nradio/images/ATT.png'> ";
		}
		else if(sim_isp == "Verizon"){
			target_isp="<img class='plmn_icon' src='/luci-static/nradio/images/Verizon.png'> ";
		}
		else if(sim_isp == "T-Mobile"){
			target_isp="<img class='plmn_icon' src='/luci-static/nradio/images/TMobile.png'> ";
		}
		else {
			target_isp="<img class='plmn_icon' src='/luci-static/nradio/images/common.png'> ";
		}
		target_isp+=sim_isp;
	}
	else{
		target_isp="<img class='plmn_icon' src='/luci-static/nradio/images/common.png'> ";
		target_isp+=isp?isp:"";
	}
	return target_isp;
}
function check_5ga(sim_isp,mode,bandcount,bandcombie){
	if(mode != "5G" )
		return 0;
	if(sim_isp == "中国联通" || sim_isp == "China Unicom" || sim_isp == "中国电信" || sim_isp == "China Telecom"){
		if(bandcount>=3)
			return 1;
		if(bandcombie>=200)
			return 1;
	}
	else if(sim_isp == "中国移动" || sim_isp == "China Mobile" || sim_isp == "中国广电" || sim_isp == "China Broadnet"){
		if(bandcount>=3)
			return 1;
	}
	return 0
}
function wired_show(arcProgress,boxid,count,max_client){

		}

				target_info.percent = target_info.base+"%";
			target_info.x1=target_info.zhx1;
			target_info.x2=target_info.zhx2;
			target_info.x3=target_info.zhx3;
		}

		color: "#fff",

		color: "#fff",

		size: "12px",

		x: target_info.x3*size_percent,
		y: 200*size_percent
	},

		text: terminal_s,
		size: "14px",
		color: "#fff",
		x: 80*size_percent,
		y: 245*size_percent

		text: terminal_l,

		color: "#fff",
		x: 220*size_percent,

			//console.log("observer:", t, e)
		},

		}

function get_wank_link(data,nbcpe_work){
	var wan_linked = 0;
	var wan_count = 0;
	if (!data){
		return wan_linked;
	}

	$.each(data, function (i, db) {
		if (db.mode == 1)
			wan_count++;
	});
	var wan_index = 0;
	$.each(data, function(i, db){

		if (db.mode == 1) {
			eth_label = "WAN";
			wan_index++;
			if (nbcpe_work && wan_index == wan_count) { 
				eth_label = "NBCPE";
			}
			else if(db.status == 0 && parseInt(db.speed) > 0){
				wan_linked = 1;
			}
		}
		
	});
	return wan_linked;
}


function match_priority(value,match_key){
	var key_info = "";
	for (key in net_type_list){
		if(net_type_list[key] == value){
			key_info=key;
			break;
		}
	}
	if(key_info.length && (key_info.indexOf(match_key) != -1 )){
		return 1;
	}
	return 0;
}

function speed_show(wan_item,upload_bytes,download_bytes,speed_interval){
	if(!wan_item)
		return;
	var cur_upload = (upload_bytes == undefined)?0:parseInt(upload_bytes);
	var cur_download = (download_bytes == undefined)?0:parseInt(download_bytes);
	var bytes_data = "";
	if (wan_item.ulbytes == 0 || wan_item.ulbytes >= cur_upload) {
		bytes_data = nradio_rate_format(0).split(" ");
	}
	else {
		bytes_data = nradio_rate_format((cur_upload-wan_item.ulbytes)*8/speed_interval).split(" ");
	}
	$(".box_wans_"+wan_item.name+" .speedup_data").html(bytes_data[0]);
	$(".box_wans_"+wan_item.name+" .speedup_unit").html(bytes_data[1]?bytes_data[1]:"bps");

	if (wan_item.dlbytes == 0 || wan_item.dlbytes >= cur_download) {
		bytes_data = nradio_rate_format(0).split(" ");
	}
	else {
		bytes_data = nradio_rate_format((cur_download-wan_item.dlbytes)*8/speed_interval).split(" ");
	}

	$(".box_wans_"+wan_item.name+" .speeddown_data").html(bytes_data[0]);
	$(".box_wans_"+wan_item.name+" .speeddown_unit").html(bytes_data[1]?bytes_data[1]:"bps");

	wan_item.ulbytes = cur_upload;
	wan_item.dlbytes = cur_download;
}

function get_speed_data(){
	var data_name = "";
	var sim_id = 0;
	for(var i=0;i<wans_data.length;i++){
		 if(wans_data[i].disabled != "1"){
			if (data_name.length)
				data_name+=",";
			data_name +=wans_data[i].name;
		 }
	}
	if(!data_name.length)
		return;

	$.getJSON('<%=url("nradio/status/speed")%>/'+data_name, function(data) {
		if(data && data.result && data.result.list){
			for(var i = 0;i<data.result.list.length;i++){
				var status = data.result.list[i];
				var wan_item = get_wans_item(status.name,wans_data);
				speed_show(wan_item,status.upload,status.download,speed_interval);
			}
		}
	});
}

function reset_wans_item(wans_data){
	for(var i=0;i<wans_data.length;i++){
		 wans_data[i].disabled = "1";
	}
	return null;
}

function reset_box_speed(wans_data){
	var show_count = 0;
	var item = null;
	var index = 0;
	for(var i=0;i<wans_data.length;i++){
		 if(wans_data[i].disabled != "1"){
			speed_show(wans_data[i],0,0,speed_interval);
		 }
	}
}
function get_wans_item(name,wans_data){
	for(var i=0;i<wans_data.length;i++){
		if(!name){
			return wans_data[0];
		}
		else{
			if(name == wans_data[i].name)
				return wans_data[i];
		}
	}
	return null;
}

function flow_show(wan_item,upload_bytes,download_bytes){
	if(!wan_item)
		return;
	var cur_upload = (upload_bytes == undefined)?0:parseInt(upload_bytes);
	var cur_download = (download_bytes == undefined)?0:parseInt(download_bytes);
	var bytes_data = nradio_byte_format(parseInt(cur_upload),"","B",1).split(" ");

	$(".box_wans_"+wan_item.name+" .flowup_data").html(bytes_data[0]);
	$(".box_wans_"+wan_item.name+" .flowup_unit").html(bytes_data[1]?bytes_data[1]:"B");

	bytes_data = nradio_byte_format(parseInt(cur_download),"","B",1).split(" ");
	$(".box_wans_"+wan_item.name+" .flowdown_data").html(bytes_data[0]);
	$(".box_wans_"+wan_item.name+" .flowdown_unit").html(bytes_data[1]?bytes_data[1]:"B");

}
